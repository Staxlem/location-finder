<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Location Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --cyan: #00ffe5;
    --cyan-dim: #00ffe544;
    --cyan-glow: #00ffe522;
    --bg: #000810;
    --red: #ff4466;
    --font: 'Share Tech Mono', 'Courier New', monospace;
  }
  body {
    background: var(--bg);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    overflow: hidden;
  }
  #app {
    width: 100%;
    max-width: 420px;
    position: relative;
  }
  #viewfinder {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    background: #000;
    aspect-ratio: 9/16;
    border: 1px solid var(--cyan-dim);
    box-shadow: 0 0 40px var(--cyan-glow), inset 0 0 20px #00000088;
  }
  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }
  #idle-screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: #334455;
  }
  #idle-icon {
    font-size: 56px;
    color: #223344;
    animation: pulse 3s ease-in-out infinite;
  }
  #idle-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: #334455;
  }
  #error-msg {
    color: var(--red);
    font-size: 11px;
    text-align: center;
    padding: 0 24px;
    line-height: 1.6;
    display: none;
  }

  /* HUD overlays */
  #hud {
    position: absolute;
    inset: 0;
    pointer-events: none;
    display: none;
  }
  #status-bar {
    position: absolute;
    top: 12px;
    left: 12px;
    right: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    letter-spacing: 2px;
  }
  #status-title { color: var(--cyan); }
  #status-right { color: #667788; }
  #status-indicator {
    display: inline-block;
    margin-left: 8px;
  }
  .status-idle     { color: #445566; }
  .status-scanning { color: #ffcc00; animation: pulse 0.8s ease-in-out infinite; }
  .status-found    { color: var(--cyan); }
  .status-error    { color: var(--red); }

  #gps-text { color: #00ffe577; font-size: 9px; margin-right: 6px; }

  /* Scan line */
  #scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #00ffe5aa, #00ffe5, #00ffe5aa, transparent);
    box-shadow: 0 0 14px var(--cyan);
    top: 0;
    opacity: 0;
  }
  #scan-line.active {
    animation: scanLine 1.8s linear infinite;
  }

  /* Corner brackets */
  .bracket-wrap {
    position: absolute;
    top: 44px; left: 16px; right: 16px; bottom: 96px;
  }
  .corner {
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: var(--cyan);
    border-style: solid;
    border-width: 0;
  }
  .corner.tl { top: 0; left: 0; border-top-width: 2px; border-left-width: 2px; }
  .corner.tr { top: 0; right: 0; border-top-width: 2px; border-right-width: 2px; }
  .corner.bl { bottom: 0; left: 0; border-bottom-width: 2px; border-left-width: 2px; }
  .corner.br { bottom: 0; right: 0; border-bottom-width: 2px; border-right-width: 2px; }

  /* Crosshair */
  #crosshair {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 22px; height: 22px;
  }
  #crosshair-ring {
    width: 22px; height: 22px;
    border: 1px solid #00ffe566;
    border-radius: 50%;
    position: relative;
  }
  #crosshair-h {
    position: absolute;
    top: 50%; left: -10px; right: -10px;
    height: 1px;
    background: #00ffe444;
    transform: translateY(-50%);
  }
  #crosshair-v {
    position: absolute;
    left: 50%; top: -10px; bottom: -10px;
    width: 1px;
    background: #00ffe444;
    transform: translateX(-50%);
  }

  /* Info panel */
  #info-panel {
    position: absolute;
    bottom: 80px;
    left: 10px; right: 10px;
    background: rgba(0,8,20,0.9);
    border: 1px solid var(--cyan-dim);
    border-radius: 8px;
    padding: 12px 14px;
    backdrop-filter: blur(10px);
    display: none;
    animation: fadeInUp 0.3s ease;
  }
  #info-label {
    color: var(--cyan);
    font-size: 9px;
    letter-spacing: 3px;
    margin-bottom: 6px;
    opacity: 0.7;
  }
  #info-name {
    color: #fff;
    font-size: 15px;
    font-weight: bold;
    margin-bottom: 4px;
    line-height: 1.3;
  }
  #info-address {
    color: #88ccdd;
    font-size: 11px;
    margin-bottom: 6px;
  }
  #info-type {
    display: inline-block;
    background: #00ffe520;
    border: 1px solid var(--cyan-dim);
    color: var(--cyan);
    font-size: 9px;
    padding: 2px 8px;
    border-radius: 4px;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  #info-desc {
    color: #aabbcc;
    font-size: 11px;
    line-height: 1.6;
    margin-top: 6px;
    border-top: 1px solid #00ffe522;
    padding-top: 8px;
  }
  #info-details {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 8px;
  }
  .detail-tag {
    background: #ffffff10;
    border: 1px solid #ffffff22;
    color: #ccddee;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    font-family: var(--font);
  }

  /* Controls */
  #controls {
    position: absolute;
    bottom: 14px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 0 14px;
    pointer-events: all;
  }
  .btn {
    border: none;
    border-radius: 6px;
    font-family: var(--font);
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    padding: 11px 18px;
    transition: opacity 0.2s;
  }
  .btn:active { opacity: 0.7; }
  #btn-start {
    background: var(--cyan);
    color: var(--bg);
    font-weight: bold;
    padding: 11px 32px;
  }
  #btn-scan {
    background: var(--cyan);
    color: var(--bg);
    font-weight: bold;
    flex: 1;
  }
  #btn-scan:disabled {
    background: #00ffe533;
    cursor: not-allowed;
  }
  #btn-flip {
    background: transparent;
    color: var(--cyan);
    border: 1px solid var(--cyan-dim);
    font-size: 16px;
    padding: 11px 14px;
  }
  #btn-stop {
    background: transparent;
    color: var(--red);
    border: 1px solid #ff446644;
    padding: 11px 14px;
  }

  #footer {
    text-align: center;
    color: #2a3a4a;
    font-size: 9px;
    letter-spacing: 2px;
    margin-top: 10px;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }
  @keyframes scanLine {
    0%   { top: 0%; opacity: 1; }
    85%  { opacity: 1; }
    100% { top: 100%; opacity: 0; }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div id="app">
  <div id="viewfinder">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" style="display:none"></canvas>

    <!-- Idle screen -->
    <div id="idle-screen">
      <div id="idle-icon">◎</div>
      <div id="idle-label">KAMERA INAKTIV</div>
      <div id="error-msg"></div>
    </div>

    <!-- HUD -->
    <div id="hud">
      <div id="status-bar">
        <span id="status-title">LOCATION SCANNER</span>
        <span id="status-right">
          <span id="gps-text"></span>
          <span id="status-indicator" class="status-idle">● BEREIT</span>
        </span>
      </div>

      <div id="scan-line"></div>

      <div class="bracket-wrap">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
      </div>

      <div id="crosshair">
        <div id="crosshair-ring">
          <div id="crosshair-h"></div>
          <div id="crosshair-v"></div>
        </div>
      </div>

      <div id="info-panel">
        <div id="info-label">▸ STANDORT ERKANNT</div>
        <div id="info-name"></div>
        <div id="info-address"></div>
        <div id="info-type"></div>
        <div id="info-desc"></div>
        <div id="info-details"></div>
      </div>
    </div>

    <!-- Controls -->
    <div id="controls">
      <button class="btn" id="btn-start" onclick="startCamera()">◎ KAMERA STARTEN</button>
    </div>
  </div>
  <div id="footer">KAMERA AUF ORT RICHTEN → SCANNEN TIPPEN</div>
</div>

<script>
let stream = null;
let facingMode = 'environment';
let scanning = false;
let gps = null;

// Get GPS
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(pos => {
    gps = { lat: pos.coords.latitude, lon: pos.coords.longitude };
    document.getElementById('gps-text').textContent =
      `GPS ${gps.lat.toFixed(3)}° `;
  }, () => {});
}

async function startCamera() {
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    video.style.display = 'block';
    document.getElementById('idle-screen').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    document.getElementById('controls').innerHTML = `
      <button class="btn" id="btn-scan" onclick="analyzeFrame()">⊕ SCANNEN</button>
      <button class="btn" id="btn-flip" onclick="flipCamera()">⇄</button>
      <button class="btn" id="btn-stop" onclick="stopCamera()">✕</button>
    `;
    setStatus('idle', '● BEREIT');
  } catch(e) {
    document.getElementById('error-msg').style.display = 'block';
    document.getElementById('error-msg').textContent =
      'Kamerazugriff verweigert. Bitte in Safari unter Einstellungen → Safari → Kamera erlauben.';
  }
}

function flipCamera() {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  startCamera();
}

function stopCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null;
  document.getElementById('video').style.display = 'none';
  document.getElementById('idle-screen').style.display = 'flex';
  document.getElementById('hud').style.display = 'none';
  document.getElementById('info-panel').style.display = 'none';
  document.getElementById('controls').innerHTML =
    `<button class="btn" id="btn-start" onclick="startCamera()">◎ KAMERA STARTEN</button>`;
}

function setStatus(type, text) {
  const el = document.getElementById('status-indicator');
  el.className = 'status-' + type;
  el.textContent = text;
}

function captureFrame() {
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  return canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
}

async function analyzeFrame() {
  if (scanning) return;
  scanning = true;
  const btn = document.getElementById('btn-scan');
  if (btn) { btn.disabled = true; btn.textContent = '◉ SCANNE...'; }
  document.getElementById('scan-line').classList.add('active');
  setStatus('scanning', '◉ SCANNE...');

  const imageData = captureFrame();
  const gpsCtx = gps
    ? `Nutzer-GPS: ${gps.lat.toFixed(5)}, ${gps.lon.toFixed(5)}.`
    : 'Kein GPS.';

  const prompt = `Du bist ein AR-Ortserkenner. Analysiere dieses Kamerabild.
${gpsCtx}
Antworte NUR mit einem JSON-Objekt, ohne Markdown-Backticks:
{"name":"Name des Ortes oder null","address":"Adresse oder null","type":"Kategorie (Restaurant/Café/Gebäude/Straße/Park/etc.)","description":"2-3 Sätze auf Deutsch über diesen Ort.","details":["Detail 1","Detail 2"],"confidence":"high|medium|low"}
Wenn du nichts eindeutig erkennst, beschreibe Architektur/Atmosphäre mit confidence low.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: imageData } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });
    const data = await res.json();
    const text = (data.content || []).map(c => c.text || '').join('');
    let parsed;
    try {
      parsed = JSON.parse(text.replace(/```json|```/g, '').trim());
    } catch {
      parsed = { name: 'Erkannt', type: 'Ort', description: text.slice(0, 250), details: [] };
    }
    showInfo(parsed);
    setStatus('found', '✓ ERKANNT');
  } catch(e) {
    setStatus('error', '✗ FEHLER');
  } finally {
    scanning = false;
    document.getElementById('scan-line').classList.remove('active');
    if (btn) { btn.disabled = false; btn.textContent = '⊕ SCANNEN'; }
  }
}

function showInfo(d) {
  document.getElementById('info-name').textContent = d.name || '';
  document.getElementById('info-address').textContent = d.address ? '📍 ' + d.address : '';
  document.getElementById('info-type').textContent = d.type ? d.type.toUpperCase() : '';
  document.getElementById('info-desc').textContent = d.description || '';
  const det = document.getElementById('info-details');
  det.innerHTML = '';
  (d.details || []).forEach(t => {
    const span = document.createElement('span');
    span.className = 'detail-tag';
    span.textContent = t;
    det.appendChild(span);
  });
  document.getElementById('info-panel').style.display = 'block';
}
</script>
</body>
</html>
